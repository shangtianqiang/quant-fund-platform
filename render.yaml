services:
  - type: web
    name: quant-fund-platform
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
